aid: betgenius
name: BetGenius
description: >-
  BetGenius is the sportsbook-operator brand of Genius Sports, a London- and
  New York-listed sports data, technology, and commercial-services group.
  Founded in 2000 and operating as a Genius Sports business unit since the
  2015 corporate consolidation, BetGenius provides licensed sportsbooks with
  an end-to-end B2B platform spanning official data and odds feeds, fully
  managed trading and risk management (Genius Trading Services), low-latency
  live video and interactive in-play streaming (BetVision and Genius Live
  Player), BetBuilder same-game-parlay pricing, ScoreCentre widgets,
  acquisition and retention marketing (FANHub, media buying, dynamic creative
  optimisation), and back-office sportsbook platform services (used by
  operators such as OPAP, 888, Betway, and Hard Rock Bet). Genius Sports
  sources official data from 400+ league partners — including the NFL, English
  Premier League, Serie A, EuroLeague, and PGA Tour — and serves 300+ licensed
  sportsbooks across regulated markets worldwide. BetGenius itself does not
  expose a self-service developer portal; its APIs (Booking API, Fixtures API
  v2, Matching API v2, Warehouse REST/Streaming/Publish APIs, LiveStats
  In-Arena and Licensing APIs, BetVision and Live Player integration SDKs)
  are documented at developer.geniussports.com and delivered to contracted
  operators via UAT and production environments using API-key authentication.
